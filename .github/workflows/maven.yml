name: Selenium Regression Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Silences the deprecation warning and opts into the latest GitHub runner node version
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Selenium Tests
        # This ensures Maven runs inside the specific module folder
        working-directory: ./ui-automation-selenium
        run: mvn clean test -Dheadless=true

      - name: Generate Allure Report
        # Only runs if tests complete (even if some failed) to show results
        if: always()
        working-directory: ./ui-automation-selenium
        run: mvn allure:report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ui-automation-selenium/allure-results
          retention-days: 20